name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

permissions: {}

env:
  TURBO_TELEMETRY_DISABLED: 1
  NODE_VERSION: 22

jobs:
  # ── Quality Gate (fast, parallel) ──────────────────────────
  quality:
    name: Lint, Type-check & Build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: npx turbo run lint type-check build

  # ── Unit & Integration Tests (parallel with quality) ───────
  unit-tests:
    name: Unit & Integration Tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: npx nuxt prepare --cwd apps/web
      - run: npx turbo run test

  # ── E2E Tests (after unit tests pass) ──────────────────────
  e2e:
    name: E2E Tests (Chromium)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build web app (mock mode)
        run: VITE_API_MODE=mock npx turbo run build --filter=@repo/web
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd apps/web && npx playwright test --config e2e/playwright.config.ts --project chromium
        env:
          CI: true
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  # ── E2E Mobile (merge to main only) ────────────────────────
  e2e-mobile:
    name: E2E Tests (Mobile)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build web app (mock mode)
        run: VITE_API_MODE=mock npx turbo run build --filter=@repo/web
      - name: Install Playwright browsers
        run: npx playwright install --with-deps webkit
      - name: Run Mobile E2E tests
        run: cd apps/web && npx playwright test --config e2e/playwright.config.ts --project mobile
        env:
          CI: true
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-mobile
          path: apps/web/playwright-report/
          retention-days: 14

  # ── Docker Build & Push (main only, after all tests pass) ──
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, unit-tests, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/fediway/web:latest
            ghcr.io/fediway/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
